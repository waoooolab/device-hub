name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Boundary Import Guard
        run: |
          python scripts/check_boundary_imports.py --own-package device_hub

      - name: Code Shape Guard
        run: |
          python scripts/check_code_shape.py --fail-file-lines 300 --fail-function-lines 40

      - name: Run Tests
        run: |
          python scripts/run_tests.py

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    uses: waoooolab/openwaoooo/.github/workflows/service-python-ci-reusable.yml@41f7ef50d7642f57ec658044e6c19246547e892c
    with:
      own_package: device_hub
      install_command: |
        python -m pip install --upgrade pip
        python -m pip install -e .
      test_command: |
        python scripts/run_tests.py

  governance-guards:
    uses: waoooolab/openwaoooo/.github/workflows/service-governance-guards-reusable.yml@41f7ef50d7642f57ec658044e6c19246547e892c
    with:
      governance_profile: standard
